name: Terraform CI/CD

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Executar o terraform apply ?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

      destroy:
        description: 'Executar o terraform destroy ?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'    

      plan_destroy:
        description: 'Planejar o destroy'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'    

permissions:
  id-token: write
  contents: read

jobs: 
  job1:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with: 
          role-to-assume: arn:aws:iam::890871562295:role/Kunlatek-Administrado-API
          aws-region: us-east-2

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2 
        with:
          terraform_wrapper: false

      - name: Terraform init
        run: terraform init -upgrade

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan.tfout 

      - name: Terraform apply
        run: terraform apply --auto-approve tfplan.tfout
        if: github.event.inputs.apply == 'true'

      - name: Print SSH private key (FORCED)
        run: |
          terraform console <<EOF
          nonsensitive(tls_private_key.ssh_key.private_key_pem)
          EOF

      - name: Terraform Plan Destroy
        run: terraform plan -destroy -out=tfplan.tfout
        if: github.event.inputs.plan_destroy == 'true'        

      - name: Terraform Destroy
        run: terraform destroy --auto-approve
        if: github.event.inputs.destroy == 'true'        
